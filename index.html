<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>人狼GMツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { font-family: sans-serif; text-align: center; padding: 20px; }
input, button { margin: 5px; padding: 6px; width: 90%; max-width: 400px; }
.player { margin: 5px; }
</style>
</head>
<body>

<h1>GM用 人狼ツール</h1>

シード値<br>
<input id="seed"><br>

参加人数(5人～)<br>
<input id="count" type="number" min="3" value="5" onchange="createInputs()"><br>

<div id="players"></div>

<button onclick="generate()">役職生成＆URL発行</button>

<h2>役職一覧</h2>
<div id="result"></div>

<h2>PL用URL</h2>
<textarea id="url" rows="4"></textarea>

<script>
// プレイヤー入力欄生成
function createInputs() {
  const count = Number(document.getElementById("count").value);
  const div = document.getElementById("players");
  div.innerHTML = "";

  for (let i = 0; i < count; i++) {
    div.innerHTML += `<input class="player" placeholder="プレイヤー名${i+1}">`;
  }
}

// 初期生成
createInputs();

// シード乱数
function seededRandom(seed) {
  let t = seed;
  return function() {
    t += 0x6D2B79F5;
    let r = Math.imul(t ^ t >>> 15, 1 | t);
    r ^= r + Math.imul(r ^ r >>> 7, 61 | r);
    return ((r ^ r >>> 14) >>> 0) / 4294967296;
  };
}

function generate() {
  const seedText = document.getElementById("seed").value;
  const count = Number(document.getElementById("count").value);
  const inputs = document.querySelectorAll(".player");

  const names = Array.from(inputs).map(i => i.value.trim());

  // チェック
  if (names.includes("")) {
    alert("名前をすべて入力してください");
    return;
  }
  if (new Set(names).size !== names.length) {
    alert("名前が重複しています");
    return;
  }

  // シード生成
  let seed = 0;
  for (let c of seedText) seed += c.charCodeAt(0);
  const rand = seededRandom(seed);

  // 役職作成
  const roles = [];
  roles.push("人狼");
  roles.push("占い師");
  while (roles.length < count) roles.push("村人");

  // シャッフル
  for (let i = roles.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [roles[i], roles[j]] = [roles[j], roles[i]];
  }

  // 表示
  const result = document.getElementById("result");
  result.innerHTML = "";
  for (let i = 0; i < count; i++) {
    result.innerHTML += `${names[i]} → ${roles[i]}<br>`;
  }

  // URL生成
  const params = new URLSearchParams();
  params.set("seed", seedText);
  params.set("names", names.join(","));
  params.set("count", count);

  const url = location.origin + location.pathname.replace("index.html","") + "player.html?" + params.toString();

  document.getElementById("url").value = url;
}
</script>

</body>
</html>
